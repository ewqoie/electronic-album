<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子画册 - 画册管理</title>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f2;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #c7c7cc;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.1);
            --danger: #ff3b30;
            --success: #34c759;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            width: 100%;
        }

        /* 顶部导航栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        .nav-link.active {
            color: var(--accent);
        }

        /* 确保用户菜单和登录按钮在右上角 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* 搜索和筛选区域 */
        .search-filter-container {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .search-container {
            flex: 1;
            min-width: 0;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-accent {
            background-color: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .nav-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s ease;
            margin-right: 16px;
            display: inline-flex;
            align-items: center;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            padding: 10px 40px 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            width: 240px;
            background-color: var(--bg-secondary);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        .filter-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .select {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .select:hover {
            border-color: var(--accent);
        }

        .sort-toggle {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sort-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 用户菜单样式 */
        .user-menu {
            position: relative;
            display: inline-block;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-avatar:hover {
            background-color: var(--accent-hover);
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 4px 16px var(--shadow);
            padding: 8px;
            min-width: 160px;
            z-index: 1000;
            display: none;
        }

        .user-dropdown.show {
            display: block;
        }

        .user-dropdown-item {
            display: block;
            width: 100%;
            padding: 8px 12px;
            text-align: left;
            border: none;
            background: none;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-dropdown-item:hover {
            background-color: var(--bg-tertiary);
        }

        .user-dropdown-item.logout {
            color: var(--danger);
        }

        /* 列表区域 */
        .library-list {
            display: grid;
            gap: 16px;
        }

        .library-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.2s ease;
        }

        .library-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background-color: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .library-info {
            flex: 1;
            min-width: 0;
        }

        .library-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .library-name { 
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-draft {
            background-color: rgba(255, 149, 0, 0.1);
            color: #ff9500;
        }

        .status-published {
            background-color: rgba(52, 199, 89, 0.1);
            color: #34c759;
        }

        .status-offline {
            background-color: rgba(142, 142, 147, 0.1);
            color: #8e8e93;
        }

        .library-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .library-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn {
            padding: 8px;
            border: none;
            border-radius: 6px;
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background-color: var(--border);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .action-btn.delete:hover {
            background-color: rgba(255, 59, 48, 0.1);
            color: var(--danger);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 24px;
                flex-wrap: wrap;
                width: 100%;
            }

            .nav-links {
                order: 3;
                width: 100%;
                justify-content: center;
                gap: 16px;
            }

            .header-left {
                flex: 1;
                min-width: 0;
                justify-content: flex-start;
                gap: 12px;
                flex-wrap: wrap;
            }

            .header-right {
                flex-direction: row;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
            }

            .search-filter-container {
                width: 100%;
                order: 4;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin-top: 8px;
            }

            .search-container {
                flex: 1;
                min-width: 0;
            }

            .filter-container {
                flex-shrink: 0;
            }

            .title {
                font-size: 20px;
            }

            .btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .header-right {
                flex-direction: column;
                align-items: flex-end;
                gap: 8px;
            }

            .search-filter-container {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            /* 确保用户菜单和登录按钮在移动端也在右上角 */
            .user-menu,
            #loginButton {
                align-self: flex-end;
            }

            .search-input {
                width: 100%;
                padding: 8px 36px 8px 12px;
                font-size: 13px;
            }

            .select {
                padding: 8px 12px;
                font-size: 13px;
            }

            .sort-toggle {
                padding: 8px;
            }

            .library-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                padding: 16px;
                gap: 16px;
            }

            .thumbnail {
                align-self: center;
                width: 64px;
                height: 64px;
                font-size: 24px;
            }

            .library-name {
                font-size: 15px;
            }

            .library-description {
                font-size: 13px;
            }

            .library-meta {
                justify-content: center;
                flex-wrap: wrap;
                font-size: 11px;
                gap: 8px;
            }

            .library-actions {
                justify-content: center;
                margin-top: 8px;
                gap: 8px;
                flex-wrap: wrap;
            }

            .action-btn {
                padding: 6px;
            }

            .action-btn svg {
                width: 14px;
                height: 14px;
            }
        }

        /* 加载状态 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            color: var(--text-tertiary);
        }

        .empty-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .empty-description {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="header-left">
                <div class="logo">电子画册</div>
                <div class="nav-links">
                    <a href="home.html" class="nav-link">首页</a>
                    <a href="pricing.html" class="nav-link">价格方案</a>
                    <a href="library.html" class="nav-link active">我的书馆</a>
                    <a href="#" class="nav-link">帮助中心</a>
                </div>
                <h1 class="title">我的书馆</h1>
                <a href="index.html" class="nav-link">返回阅读器</a>
                <button class="btn btn-accent" id="newLibraryBtn">
                    <span>+</span>
                    <span>新建书馆</span>
                </button>
            </div>
            <div class="header-right">
                <!-- 搜索和筛选区域 -->
                <div class="search-filter-container">
                    <div class="search-container">
                        <input type="text" class="search-input" placeholder="搜索书馆" id="searchInput">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <div class="filter-container">
                        <select class="select" id="timeFilter">
                            <option value="all">时间不限</option>
                            <option value="today">今天</option>
                            <option value="week">本周</option>
                            <option value="month">本月</option>
                            <option value="year">今年</option>
                        </select>
                        <button class="sort-toggle" id="sortToggle" title="切换排序">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="18 15 12 9 6 15"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- 登录/用户菜单 -->
                <div id="loginButton" class="btn" onclick="window.location.href='login.html'">登录</div>
                <div id="userMenu" class="user-menu" style="display: none;">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div class="user-dropdown" id="userDropdown">
                        <button class="user-dropdown-item" id="userProfile">个人资料</button>
                        <button class="user-dropdown-item" id="userSettings">设置</button>
                        <button class="user-dropdown-item logout" id="userLogout">退出登录</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 书馆列表 -->
        <div class="library-list" id="libraryList">
            <!-- 列表项将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        // 模拟书馆数据
        let libraries = [
            {
                id: 1,
                name: "艺术画册收藏",
                description: "精选艺术作品收藏",
                cover: "📚",
                category: "艺术",
                tags: ["艺术", "收藏", "绘画"],
                status: "published", // draft, published, offline
                createdAt: "2026-02-10T10:30:00",
                updatedAt: "2026-02-18T15:45:00",
                publishedAt: "2026-02-18T15:45:00",
                access: "public", // public, password, private
                password: null,
                version: 1,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-02-18T15:45:00",
                        description: "初始版本"
                    }
                ]
            },
            {
                id: 2,
                name: "摄影作品选集",
                description: "个人摄影作品精选",
                cover: "📷",
                category: "摄影",
                tags: ["摄影", "风光", "人像"],
                status: "published",
                createdAt: "2026-02-05T09:15:00",
                updatedAt: "2026-02-19T08:20:00",
                publishedAt: "2026-02-19T08:20:00",
                access: "public",
                password: null,
                version: 1,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-02-19T08:20:00",
                        description: "初始版本"
                    }
                ]
            },
            {
                id: 3,
                name: "设计灵感集",
                description: "UI/UX设计灵感收集",
                cover: "🎨",
                category: "设计",
                tags: ["设计", "UI", "UX"],
                status: "draft",
                createdAt: "2026-01-20T14:20:00",
                updatedAt: "2026-02-17T11:30:00",
                publishedAt: null,
                access: "public",
                password: null,
                version: 2,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-01-20T14:20:00",
                        description: "初始版本"
                    },
                    {
                        version: 2,
                        createdAt: "2026-02-17T11:30:00",
                        description: "更新封面和内容"
                    }
                ]
            },
            {
                id: 4,
                name: "旅行记忆册",
                description: "旅行中的美好回忆",
                cover: "✈️",
                category: "生活",
                tags: ["旅行", "生活", "回忆"],
                status: "offline",
                createdAt: "2025-12-15T16:45:00",
                updatedAt: "2026-02-16T13:10:00",
                publishedAt: "2026-01-01T00:00:00",
                access: "public",
                password: null,
                version: 1,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-01-01T00:00:00",
                        description: "初始版本"
                    }
                ]
            }
        ];

        let sortOrder = 'desc'; // 默认降序

        // DOM 元素
        const libraryList = document.getElementById('libraryList');
        const searchInput = document.getElementById('searchInput');
        const timeFilter = document.getElementById('timeFilter');
        const sortToggle = document.getElementById('sortToggle');
        const newLibraryBtn = document.getElementById('newLibraryBtn');

        // 初始化
        async function init() {
            checkLoginStatus();
            bindEvents();
            await loadLibraries();
        }

        // 绑定事件
        function bindEvents() {
            // 搜索功能
            searchInput.addEventListener('input', renderLibraries);
            
            // 时间筛选
            timeFilter.addEventListener('change', renderLibraries);
            
            // 排序切换
            sortToggle.addEventListener('click', toggleSort);
            
            // 新建书馆
            newLibraryBtn.addEventListener('click', createNewLibrary);
            
            // 用户菜单事件
            const userAvatar = document.getElementById('userAvatar');
            if (userAvatar) {
                userAvatar.addEventListener('click', toggleUserDropdown);
            }
            
            // 退出登录按钮点击事件
            const userLogout = document.getElementById('userLogout');
            if (userLogout) {
                userLogout.addEventListener('click', logout);
            }
            
            // 点击页面其他地方关闭下拉菜单
            document.addEventListener('click', function(event) {
                const userMenu = document.getElementById('userMenu');
                const userDropdown = document.getElementById('userDropdown');
                if (userMenu && !userMenu.contains(event.target)) {
                    userDropdown.classList.remove('show');
                }
            });
        }

        // 从后端API加载画册数据
        async function loadLibraries() {
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user || !user.token) {
                    // 用户未登录，显示空状态
                    renderLibraries();
                    return;
                }

                // 调用后端API获取画册列表
                const response = await fetch('http://localhost:3000/api/libraries', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${user.token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    // 解析 tags 字段，确保它是一个数组
                    libraries = data.map(library => {
                        try {
                            library.tags = typeof library.tags === 'string' ? JSON.parse(library.tags) : library.tags;
                            if (!Array.isArray(library.tags)) {
                                library.tags = [];
                            }
                        } catch (error) {
                            library.tags = [];
                        }
                        return library;
                    });
                } else {
                    const error = await response.json();
                    console.error('获取画册列表失败:', error.error);
                    alert('获取画册列表失败: ' + (error.error || '服务器错误'));
                }
            } catch (error) {
                console.error('加载画册数据失败:', error);
                alert('加载画册数据失败: ' + error.message);
            } finally {
                renderLibraries();
            }
        }
        
        // 检查登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('user');
            const loginButton = document.getElementById('loginButton');
            const userMenu = document.getElementById('userMenu');
            const userAvatar = document.getElementById('userAvatar');
            
            if (user) {
                const userData = JSON.parse(user);
                // 显示用户菜单
                loginButton.style.display = 'none';
                userMenu.style.display = 'inline-block';
                
                // 设置用户头像
                if (userAvatar) {
                    const initial = userData.name.charAt(0).toUpperCase();
                    userAvatar.textContent = initial;
                }
            } else {
                // 显示登录按钮
                loginButton.style.display = 'block';
                userMenu.style.display = 'none';
            }
        }
        
        // 切换用户下拉菜单
        function toggleUserDropdown() {
            const userDropdown = document.getElementById('userDropdown');
            userDropdown.classList.toggle('show');
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('user');
            alert('已退出登录');
            window.location.reload();
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

            if (sortOrder === 'asc') {

        // 过滤和排序书馆
        function getFilteredLibraries() {
            const searchTerm = searchInput.value.toLowerCase();
            const timeFilterValue = timeFilter.value;
            
            let filtered = libraries.filter(library => {
                // 搜索过滤
                const matchesSearch = library.name.toLowerCase().includes(searchTerm);
                
                // 时间过滤
                let matchesTime = true;
                if (timeFilterValue !== 'all') {
                    const libraryDate = new Date(library.createdAt);
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    
                    switch (timeFilterValue) {
                        case 'today':
                            matchesTime = libraryDate >= today;
                            break;
                        case 'week':
                            const weekAgo = new Date(today);
                            weekAgo.setDate(weekAgo.getDate() - 7);
                            matchesTime = libraryDate >= weekAgo;
                            break;
                        case 'month':
                            const monthAgo = new Date(today);
                            monthAgo.setMonth(monthAgo.getMonth() - 1);
                            matchesTime = libraryDate >= monthAgo;
                            break;
                        case 'year':
                            const yearAgo = new Date(today);
                            yearAgo.setFullYear(yearAgo.getFullYear() - 1);
                            matchesTime = libraryDate >= yearAgo;
                            break;
                    }
                }
                
                return matchesSearch && matchesTime;
            });
            
            // 排序
            filtered.sort((a, b) => {
                const dateA = new Date(a.createdAt);
                const dateB = new Date(b.createdAt);
                
                if (sortOrder === 'asc') {
                    return dateA - dateB;
                } else {
                    return dateB - dateA;
                }
            });
            
            return filtered;
        }

                    const libraryTags = prompt('请输入书馆标签（用逗号分隔）:');

                            alert('请先登录');

                        }

                        const response = await fetch('http://localhost:3000/api/libraries', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${user.token}`
                            },
                            body: JSON.stringify({
                                name: libraryName.trim(),

        // 发布书馆
        async function publishLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const access = prompt('请选择访问权限:\n1. 公开\n2. 密码访问\n3. 指定用户');
            let password = null;
            
            if (access === '2') {
                password = prompt('请设置访问密码:');
            }
            
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user || !user.token) {
                    alert('请先登录');
                    return;
                }

                // 调用后端API更新画册访问权限
                await fetch(`http://localhost:3000/api/libraries/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify({
                        access: access === '1' ? 'public' : access === '2' ? 'password' : 'private',
                        password: password
                    })
                });

                // 调用后端API发布画册
                const response = await fetch(`http://localhost:3000/api/libraries/${id}/publish`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${user.token}`
                    }
                });

                if (response.ok) {

                } else {
                    const error = await response.json();

                }
            } catch (error) {
                alert('发布失败：' + error.message);
            }
        }

                    // 实现简单的拖拽排序
                    const imageItems = document.querySelectorAll('.image-item');
                    imageItems.forEach(item => {

                            if (e.target.closest('.drag-handle')) {
                                item.style.cursor = 'grabbing';
                                item.style.opacity = '0.5';
                                item.style.zIndex = '1000';
                                
                                let startX = e.clientX;
                                let startY = e.clientY;
                                let startIndex = Array.from(imageItems).indexOf(item);
                                
                                function onMouseMove(e) {
                                    const deltaX = e.clientX - startX;
                                    const deltaY = e.clientY - startY;
                                    item.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                                    
                                    // 计算新位置
                                    const rect = item.getBoundingClientRect();
                                    const centerX = rect.left + rect.width / 2;
                                    const centerY = rect.top + rect.height / 2;
                                    
                                    Array.from(imageItems).forEach((otherItem, index) => {
                                        if (otherItem !== item) {
                                            const otherRect = otherItem.getBoundingClientRect();
                                            if (
                                                centerX > otherRect.left &&
                                                centerX < otherRect.right &&
                                                centerY > otherRect.top &&
                                                centerY < otherRect.bottom
                                            ) {
                                                if (index < startIndex) {
                                                    imageList.insertBefore(item, otherItem);

                                                    imageList.insertBefore(item, otherItem.nextSibling);

                    reader.onload = function(event) {
                        library.cover = `<img src="${event.target.result}" style="width: 100%; height: 100%; object-fit: cover;" />`;
                        library.updatedAt = new Date().toISOString();
                        renderLibraries();
                        dialog.remove();
                        alert('封面上传成功！');
                    };
                    reader.readAsDataURL(file);
                } else if (presetSection.style.display === 'block') {
                    // 预设图标选择
                    const selectedIcon = document.querySelector('.preset-icon[style*="border-color: rgb(0, 123, 255)"]');
                    if (selectedIcon) {
                        library.cover = selectedIcon.dataset.icon;
                        library.updatedAt = new Date().toISOString();
                        renderLibraries();
                        dialog.remove();
                        alert('封面更新成功！');
                    } else {
                        alert('请选择一个预设图标！');
                    }
                } else if (urlSection.style.display === 'block' && coverUrlInput.value.trim()) {
                    // URL输入
                    library.cover = `<img src="${coverUrlInput.value.trim()}" style="width: 100%; height: 100%; object-fit: cover;" />`;
                    library.updatedAt = new Date().toISOString();
                    renderLibraries();
                    dialog.remove();
                    alert('封面更新成功！');
                } else {
                    alert('请选择或输入封面图片！');
                }
            };
        }

        // 预览画册
        function previewLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const deviceType = prompt('请选择预览设备:\n1. PC\n2. 平板\n3. 手机');
            
            let deviceName = 'PC';
            let width = '100%';
            let height = '80vh';
            
            if (deviceType === '2') {
                deviceName = '平板';
                width = '768px';
                height = '1024px';
            } else if (deviceType === '3') {
                deviceName = '手机';
                width = '375px';
                height = '667px';
            }
            
            const previewHtml = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999;">
                    <div style="background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); overflow: hidden;">
                        <div style="padding: 16px; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                            <h3>${library.name} - ${deviceName}预览</h3>
                            <button onclick="this.parentElement.parentElement.parentElement.remove()" style="padding: 8px 16px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer;">关闭</button>
                        </div>
                        <div style="width: ${width}; height: ${height}; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <div style="width: 200px; height: 200px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 48px;">
                                ${library.cover}
                            </div>
                            <h2>${library.name}</h2>
                            <p style="color: #666; margin: 10px 0;">${library.description}</p>
                            <div style="color: #999; font-size: 14px; margin-top: 20px;">
                                分类: ${library.category}<br>
                                标签: ${Array.isArray(library.tags) ? library.tags.join(', ') : (typeof library.tags === 'string' ? JSON.parse(library.tags).join(', ') : library.tags)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', previewHtml);
        }

        // 定时发布
        function schedulePublish(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const publishTime = prompt('请输入定时发布时间\n格式：YYYY-MM-DD HH:MM\n例如：2026-02-20 10:00');
            
            if (publishTime) {
                // 模拟定时发布
                const scheduledDate = new Date(publishTime.replace(' ', 'T'));
                const now = new Date();
                
                if (scheduledDate > now) {
                    const timeUntilPublish = scheduledDate - now;
                    
                    alert(`画册将在 ${publishTime} 自动发布！`);
                    
                    // 这里可以添加实际的定时任务逻辑
                    // 由于是前端模拟，这里仅做提示
                    setTimeout(() => {
                        if (confirm(`画册 "${library.name}" 已到发布时间，是否立即发布？`)) {
                            publishLibrary(id);
                        }
                    }, 5000); // 5秒后模拟发布提醒
                } else {
                    alert('发布时间不能早于当前时间！');
                }
            }
        }

        // 外观设置
        function editAppearance(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const transitionEffect = prompt('请选择页面转场效果:\n1. 翻页\n2. 滑动\n3. 淡入淡出');
            
            alert('外观设置已保存！\n\n设置内容：\n- 页面转场效果：' + (transitionEffect === '1' ? '翻页' : transitionEffect === '2' ? '滑动' : '淡入淡出'));
            
            library.updatedAt = new Date().toISOString();
            renderLibraries();
        }

        // 分享书馆
        function shareLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            if (library.status !== 'published') {
                alert('只有已发布的书馆才能分享！');
                return;
            }
            
            const shareLink = `https://example.com/library/${id}`;
            navigator.clipboard.writeText(shareLink).then(() => {
                alert('分享链接已复制到剪贴板！\n\n链接：' + shareLink);
            });
        }

        // 复制书馆
        function duplicateLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const newLibrary = JSON.parse(JSON.stringify(library));
            newLibrary.id = Date.now();
            newLibrary.name = library.name + ' (副本)';
            newLibrary.status = 'draft';
            newLibrary.createdAt = new Date().toISOString();
            newLibrary.updatedAt = new Date().toISOString();
            newLibrary.publishedAt = null;
            newLibrary.version = 1;
            newLibrary.versions = [
                {
                    version: 1,
                    createdAt: newLibrary.createdAt,
                    description: '复制版本'
                }
            ];
            
            libraries.unshift(newLibrary);
            renderLibraries();
            alert('书馆复制成功！');
        }

        // 初始化应用
        init();
    </script>
</body>
</html>
