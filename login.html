<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子画册 - 用户登录</title>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --border: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.1);
            --success: #34c759;
            --error: #ff3b30;
        }

        [data-theme="dark"] {
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #0a84ff;
            --border: #38383a;
            --shadow: rgba(0, 0, 0, 0.3);
            --success: #34c759;
            --error: #ff453a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow);
            padding: 40px;
            transition: all 0.3s ease;
            display: flex;
            gap: 40px;
        }

        .auth-left {
            flex: 1;
            max-width: 400px;
        }

        .auth-right {
            flex: 1;
            max-width: 400px;
        }

        /* 云展网介绍区域 */
        .yunzhan-intro {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .yunzhan-logo {
            font-size: 28px;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 8px;
        }

        .yunzhan-url {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .yunzhan-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .file-types {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .file-type {
            padding: 8px 16px;
            background-color: rgba(0, 113, 227, 0.1);
            color: var(--accent);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .features {
            text-align: left;
            margin-bottom: 24px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .feature-item svg {
            width: 16px;
            height: 16px;
            color: var(--success);
            flex-shrink: 0;
        }

        .feature-item span {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .share-platforms {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }

        .share-platform {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: rgba(0, 113, 227, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 16px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .auth-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        .form-error {
            font-size: 12px;
            color: var(--error);
            margin-top: 4px;
            min-height: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: #0077ed;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 113, 227, 0.05);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
        }

        .auth-switch {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .social-login {
            margin: 24px 0;
            text-align: center;
        }

        .social-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
        }

        .social-divider span {
            padding: 0 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .social-btn:hover {
            background-color: var(--bg-primary);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background-color: var(--bg-secondary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .auth-card {
                padding: 24px;
                flex-direction: column;
            }

            .auth-left {
                display: none;
            }

            .auth-right {
                max-width: 100%;
            }

            .yunzhan-title {
                font-size: 20px;
            }

            .file-types {
                gap: 8px;
            }

            .file-type {
                padding: 6px 12px;
                font-size: 12px;
            }

            .auth-title {
                font-size: 18px;
            }

            .form-input {
                padding: 10px 14px;
                font-size: 14px;
            }

            .btn {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="container">
        <div class="auth-card">
            <!-- 左侧：电子画册介绍 -->
            <div class="auth-left">
                <div class="yunzhan-intro">

                    <div class="file-types">
                        <span class="file-type">PDF</span>

                        <span class="file-type">PPT</span>
                        <span class="file-type">Word</span>
                        <span class="file-type">套用模板</span>
                    </div>
                    <div class="features">
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span>免费制作 做好只要3分钟</span>
                        </div>
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span>3D翻页 更真实的阅读体验</span>
                        </div>
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span>8大功能 赋能品牌营销宣传</span>
                        </div>
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span>在线阅读 生成链接 & 二维码</span>
                        </div>
                        <div class="feature-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span>随时随地 在APP制作和管理</span>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-secondary);">
                        作品可分享到
                    </div>
                    <div class="share-platforms">
                        <div class="share-platform">💬</div>
                        <div class="share-platform">🌈</div>
                        <div class="share-platform">🔔</div>
                        <div class="share-platform">📱</div>
                        <div class="share-platform">...</div>
                    </div>
                </div>
            </div>

            <!-- 右侧：登录表单 -->
            <div class="auth-right">
                <!-- 登录表单 -->
                <div id="loginForm" class="auth-form">
                    <div class="auth-header">
                        <div class="logo">电子画册</div>
                        <h2 class="auth-title">用户登录</h2>
                        <p class="auth-subtitle">登录后即可访问您的电子画册</p>
                    </div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label" for="loginEmail">邮箱</label>
                            <input type="email" class="form-input" id="loginEmail" name="email" required placeholder="请输入您的邮箱">
                            <div class="form-error" id="loginEmailError"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="loginPassword">密码</label>
                            <input type="password" class="form-input" id="loginPassword" name="password" required placeholder="请输入您的密码">
                            <div class="form-error" id="loginPasswordError"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">登录</button>

                        <div class="social-login">
                            <div class="social-divider">
                                <span>或</span>
                            </div>
                            <button type="button" class="social-btn" onclick="loginWithGoogle()">
                                <svg width="20" height="20" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
                                </svg>
                                使用 Google 登录
                            </button>
                            <button type="button" class="social-btn" onclick="loginWithWeChat()">
                                <svg width="20" height="20" viewBox="0 0 24 24">
                                    <path fill="#07C160" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1.99 14.93c-2.98-.44-5.16-2.89-5.16-5.93 0-3.31 2.69-6 6-6s6 2.69 6 6c0 3.04-2.18 5.49-5.16 5.93L10 16h4l-.01 0.93z"></path>
                                    <path fill="#07C160" d="M10 13c0 .55.45 1 1 1h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1zm1-3c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"></path>
                                </svg>
                                使用微信登录
                            </button>
                        </div>

                        <div class="auth-footer">
                            <p class="auth-switch">
                                还没有账号？ <span class="auth-link" onclick="switchToRegister()">立即注册</span>
                            </p>
                            <p class="auth-switch">
                                <span class="auth-link" onclick="forgotPassword()">忘记密码？</span>
                            </p>
                        </div>
                    </form>
                </div>
            <!-- 注册表单 -->
            <div id="registerForm" class="auth-form" style="display: none;">
                <div class="auth-header">
                    <div class="logo">电子画册</div>
                    <h2 class="auth-title">创建账号</h2>
                    <p class="auth-subtitle">注册后即可使用电子画册服务</p>
                </div>

                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label" for="registerName">用户名</label>
                        <input type="text" class="form-input" id="registerName" name="name" required placeholder="请输入您的用户名">
                        <div class="form-error" id="registerNameError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="registerEmail">邮箱</label>
                        <input type="email" class="form-input" id="registerEmail" name="email" required placeholder="请输入您的邮箱">
                        <div class="form-error" id="registerEmailError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="registerPassword">密码</label>
                        <input type="password" class="form-input" id="registerPassword" name="password" required placeholder="请输入您的密码（至少6位）">
                        <div class="form-error" id="registerPasswordError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="registerConfirmPassword">确认密码</label>
                        <input type="password" class="form-input" id="registerConfirmPassword" name="confirmPassword" required placeholder="请再次输入您的密码">
                        <div class="form-error" id="registerConfirmPasswordError"></div>
                    </div>

                    <button type="submit" class="btn btn-primary">注册</button>

                    <div class="social-login">
                        <div class="social-divider">
                            <span>或</span>
                        </div>
                        <button type="button" class="social-btn" onclick="registerWithGoogle()">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
                            </svg>
                            使用 Google 注册
                        </button>
                        <button type="button" class="social-btn" onclick="registerWithWeChat()">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path fill="#07C160" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1.99 14.93c-2.98-.44-5.16-2.89-5.16-5.93 0-3.31 2.69-6 6-6s6 2.69 6 6c0 3.04-2.18 5.49-5.16 5.93L10 16h4l-.01 0.93z"></path>
                                <path fill="#07C160" d="M10 13c0 .55.45 1 1 1h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1zm1-3c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"></path>
                            </svg>
                            使用微信注册
                        </button>
                    </div>

                    <div class="auth-footer">
                        <p class="auth-switch">
                            已有账号？ <span class="auth-link" onclick="switchToLogin()">立即登录</span>
                        </p>
                    </div>
                </form>
            </div>

            <!-- 忘记密码表单 -->
            <div id="forgotPasswordForm" class="auth-form" style="display: none;">
                <div class="auth-header">
                    <div class="logo">电子画册</div>
                    <h2 class="auth-title">忘记密码</h2>
                    <p class="auth-subtitle">输入您的邮箱，我们将发送重置链接</p>
                </div>

                <form onsubmit="handleForgotPassword(event)">
                    <div class="form-group">
                        <label class="form-label" for="forgotEmail">邮箱</label>
                        <input type="email" class="form-input" id="forgotEmail" name="email" required placeholder="请输入您的邮箱">
                        <div class="form-error" id="forgotEmailError"></div>
                    </div>

                    <button type="submit" class="btn btn-primary">发送重置链接</button>

                    <div class="auth-footer">
                        <p class="auth-switch">
                            <span class="auth-link" onclick="switchToLogin()">返回登录</span>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            htmlElement.setAttribute('data-theme', savedTheme);
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // 表单切换
        function switchToLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('forgotPasswordForm').style.display = 'none';
        }

        function switchToRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('forgotPasswordForm').style.display = 'none';
        }

        function forgotPassword() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('forgotPasswordForm').style.display = 'block';
        }

        // 表单验证
        function validateLoginForm() {
            let isValid = true;
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // 邮箱验证
            if (!email) {
                document.getElementById('loginEmailError').textContent = '请输入邮箱';
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('loginEmailError').textContent = '请输入有效的邮箱地址';
                isValid = false;
            } else {
                document.getElementById('loginEmailError').textContent = '';
            }

            // 密码验证
            if (!password) {
                document.getElementById('loginPasswordError').textContent = '请输入密码';
                isValid = false;
            } else {
                document.getElementById('loginPasswordError').textContent = '';
            }

            return isValid;
        }

        function validateRegisterForm() {
            let isValid = true;
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // 用户名验证
            if (!name) {
                document.getElementById('registerNameError').textContent = '请输入用户名';
                isValid = false;
            } else {
                document.getElementById('registerNameError').textContent = '';
            }

            // 邮箱验证
            if (!email) {
                document.getElementById('registerEmailError').textContent = '请输入邮箱';
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('registerEmailError').textContent = '请输入有效的邮箱地址';
                isValid = false;
            } else {
                document.getElementById('registerEmailError').textContent = '';
            }

            // 密码验证
            if (!password) {
                document.getElementById('registerPasswordError').textContent = '请输入密码';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('registerPasswordError').textContent = '密码长度至少为6位';
                isValid = false;
            } else {
                document.getElementById('registerPasswordError').textContent = '';
            }

            // 确认密码验证
            if (!confirmPassword) {
                document.getElementById('registerConfirmPasswordError').textContent = '请确认密码';
                isValid = false;
            } else if (confirmPassword !== password) {
                document.getElementById('registerConfirmPasswordError').textContent = '两次输入的密码不一致';
                isValid = false;
            } else {
                document.getElementById('registerConfirmPasswordError').textContent = '';
            }

            return isValid;
        }

        function validateForgotPasswordForm() {
            let isValid = true;
            const email = document.getElementById('forgotEmail').value;

            // 邮箱验证
            if (!email) {
                document.getElementById('forgotEmailError').textContent = '请输入邮箱';
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('forgotEmailError').textContent = '请输入有效的邮箱地址';
                isValid = false;
            } else {
                document.getElementById('forgotEmailError').textContent = '';
            }

            return isValid;
        }

        // 表单提交处理
        async function handleLogin(event) {
            event.preventDefault();
            
            if (!validateLoginForm()) {
                return;
            }

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // 创建错误信息显示区域
            let errorDiv = document.getElementById('loginError');
            if (!errorDiv) {
                errorDiv = document.createElement('div');
                errorDiv.id = 'loginError';
                errorDiv.style.color = 'red';
                errorDiv.style.marginTop = '10px';
                document.querySelector('#loginForm form').appendChild(errorDiv);
            }

            errorDiv.innerHTML = '登录中...';

            try {
                // 调用后端API登录
                errorDiv.innerHTML += '<br>准备发送登录请求';
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                errorDiv.innerHTML += '<br>登录响应状态: ' + response.status;

                // 尝试读取响应文本
                errorDiv.innerHTML += '<br>准备读取响应文本';
                const text = await response.text();
                errorDiv.innerHTML += '<br>登录响应文本: ' + text;

                // 检查响应文本是否为空
                if (!text) {
                    throw new Error('响应文本为空');
                }

                // 尝试解析JSON
                errorDiv.innerHTML += '<br>准备解析JSON';
                const data = JSON.parse(text);
                errorDiv.innerHTML += '<br>登录响应JSON: ' + JSON.stringify(data);

                if (!response.ok) {
                    throw new Error(data.error || '登录失败');
                }

                // 存储用户信息和token到本地存储
                const user = {
                    id: data.user.id,
                    email: data.user.email,
                    name: data.user.name,
                    loggedIn: true,
                    token: data.token
                };

                localStorage.setItem('user', JSON.stringify(user));

                // 登录成功后跳转到主页
                alert('登录成功！');
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.innerHTML += '<br>登录错误: ' + error.message;
                errorDiv.innerHTML += '<br>登录错误堆栈: ' + error.stack;
                alert('登录失败：' + error.message);
            }
        }
