<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的书馆 - 画册管理</title>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f2;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #c7c7cc;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.1);
            --danger: #ff3b30;
            --success: #34c759;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 顶部操作区 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-accent {
            background-color: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .nav-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s ease;
            margin-right: 16px;
            display: inline-flex;
            align-items: center;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            padding: 10px 40px 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            width: 240px;
            background-color: var(--bg-secondary);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        .filter-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .select {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .select:hover {
            border-color: var(--accent);
        }

        .sort-toggle {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sort-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 列表区域 */
        .library-list {
            display: grid;
            gap: 16px;
        }

        .library-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.2s ease;
        }

        .library-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background-color: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .library-info {
            flex: 1;
            min-width: 0;
        }

        .library-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .library-name { 
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-draft {
            background-color: rgba(255, 149, 0, 0.1);
            color: #ff9500;
        }

        .status-published {
            background-color: rgba(52, 199, 89, 0.1);
            color: #34c759;
        }

        .status-offline {
            background-color: rgba(142, 142, 147, 0.1);
            color: #8e8e93;
        }

        .library-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .library-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn {
            padding: 8px;
            border: none;
            border-radius: 6px;
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background-color: var(--border);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .action-btn.delete:hover {
            background-color: rgba(255, 59, 48, 0.1);
            color: var(--danger);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }

            .header-left {
                justify-content: space-between;
            }

            .header-right {
                flex-wrap: wrap;
                gap: 12px;
            }

            .search-input {
                width: 100%;
            }

            .library-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .thumbnail {
                align-self: center;
            }

            .library-meta {
                justify-content: center;
                flex-wrap: wrap;
            }

            .library-actions {
                justify-content: center;
                margin-top: 12px;
            }
        }

        /* 加载状态 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            color: var(--text-tertiary);
        }

        .empty-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .empty-description {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部操作区 -->
        <div class="header">
            <div class="header-left">
                <h1 class="title">我的书馆</h1>
                <a href="index.html" class="nav-link">返回阅读器</a>
                <button class="btn btn-accent" id="newLibraryBtn">
                    <span>+</span>
                    <span>新建书馆</span>
                </button>
            </div>
            <div class="header-right">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="搜索书馆" id="searchInput">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <div class="filter-container">
                    <select class="select" id="timeFilter">
                        <option value="all">时间不限</option>
                        <option value="today">今天</option>
                        <option value="week">本周</option>
                        <option value="month">本月</option>
                        <option value="year">今年</option>
                    </select>
                    <button class="sort-toggle" id="sortToggle" title="切换排序">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="18 15 12 9 6 15"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 书馆列表 -->
        <div class="library-list" id="libraryList">
            <!-- 列表项将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        // 模拟书馆数据
        let libraries = [
            {
                id: 1,
                name: "艺术画册收藏",
                description: "精选艺术作品收藏",
                cover: "📚",
                category: "艺术",
                tags: ["艺术", "收藏", "绘画"],
                status: "published", // draft, published, offline
                createdAt: "2026-02-10T10:30:00",
                updatedAt: "2026-02-18T15:45:00",
                publishedAt: "2026-02-18T15:45:00",
                access: "public", // public, password, private
                password: null,
                version: 1,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-02-18T15:45:00",
                        description: "初始版本"
                    }
                ]
            },
            {
                id: 2,
                name: "摄影作品选集",
                description: "个人摄影作品精选",
                cover: "📷",
                category: "摄影",
                tags: ["摄影", "风光", "人像"],
                status: "published",
                createdAt: "2026-02-05T09:15:00",
                updatedAt: "2026-02-19T08:20:00",
                publishedAt: "2026-02-19T08:20:00",
                access: "public",
                password: null,
                version: 1,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-02-19T08:20:00",
                        description: "初始版本"
                    }
                ]
            },
            {
                id: 3,
                name: "设计灵感集",
                description: "UI/UX设计灵感收集",
                cover: "🎨",
                category: "设计",
                tags: ["设计", "UI", "UX"],
                status: "draft",
                createdAt: "2026-01-20T14:20:00",
                updatedAt: "2026-02-17T11:30:00",
                publishedAt: null,
                access: "public",
                password: null,
                version: 2,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-01-20T14:20:00",
                        description: "初始版本"
                    },
                    {
                        version: 2,
                        createdAt: "2026-02-17T11:30:00",
                        description: "更新封面和内容"
                    }
                ]
            },
            {
                id: 4,
                name: "旅行记忆册",
                description: "旅行中的美好回忆",
                cover: "✈️",
                category: "生活",
                tags: ["旅行", "生活", "回忆"],
                status: "offline",
                createdAt: "2025-12-15T16:45:00",
                updatedAt: "2026-02-16T13:10:00",
                publishedAt: "2026-01-01T00:00:00",
                access: "public",
                password: null,
                version: 1,
                versions: [
                    {
                        version: 1,
                        createdAt: "2026-01-01T00:00:00",
                        description: "初始版本"
                    }
                ]
            }
        ];

        let sortOrder = 'desc'; // 默认降序

        // DOM 元素
        const libraryList = document.getElementById('libraryList');
        const searchInput = document.getElementById('searchInput');
        const timeFilter = document.getElementById('timeFilter');
        const sortToggle = document.getElementById('sortToggle');
        const newLibraryBtn = document.getElementById('newLibraryBtn');

        // 初始化
        function init() {
            renderLibraries();
            bindEvents();
        }

        // 绑定事件
        function bindEvents() {
            // 搜索功能
            searchInput.addEventListener('input', renderLibraries);
            
            // 时间筛选
            timeFilter.addEventListener('change', renderLibraries);
            
            // 排序切换
            sortToggle.addEventListener('click', toggleSort);
            
            // 新建书馆
            newLibraryBtn.addEventListener('click', createNewLibrary);
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 切换排序
        function toggleSort() {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            
            // 更新排序图标
            const icon = sortToggle.querySelector('svg');
            if (sortOrder === 'asc') {
                icon.innerHTML = '<polyline points="6 9 12 15 18 9"></polyline>';
            } else {
                icon.innerHTML = '<polyline points="18 15 12 9 6 15"></polyline>';
            }
            
            renderLibraries();
        }

        // 过滤和排序书馆
        function getFilteredLibraries() {
            const searchTerm = searchInput.value.toLowerCase();
            const timeFilterValue = timeFilter.value;
            
            let filtered = libraries.filter(library => {
                // 搜索过滤
                const matchesSearch = library.name.toLowerCase().includes(searchTerm);
                
                // 时间过滤
                let matchesTime = true;
                if (timeFilterValue !== 'all') {
                    const libraryDate = new Date(library.createdAt);
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    
                    switch (timeFilterValue) {
                        case 'today':
                            matchesTime = libraryDate >= today;
                            break;
                        case 'week':
                            const weekAgo = new Date(today);
                            weekAgo.setDate(weekAgo.getDate() - 7);
                            matchesTime = libraryDate >= weekAgo;
                            break;
                        case 'month':
                            const monthAgo = new Date(today);
                            monthAgo.setMonth(monthAgo.getMonth() - 1);
                            matchesTime = libraryDate >= monthAgo;
                            break;
                        case 'year':
                            const yearAgo = new Date(today);
                            yearAgo.setFullYear(yearAgo.getFullYear() - 1);
                            matchesTime = libraryDate >= yearAgo;
                            break;
                    }
                }
                
                return matchesSearch && matchesTime;
            });
            
            // 排序
            filtered.sort((a, b) => {
                const dateA = new Date(a.createdAt);
                const dateB = new Date(b.createdAt);
                
                if (sortOrder === 'asc') {
                    return dateA - dateB;
                } else {
                    return dateB - dateA;
                }
            });
            
            return filtered;
        }

        // 获取状态标签
        function getStatusLabel(status) {
            const statusMap = {
                draft: { text: '草稿', class: 'status-draft' },
                published: { text: '已发布', class: 'status-published' },
                offline: { text: '已下架', class: 'status-offline' }
            };
            return statusMap[status] || { text: '未知', class: 'status-unknown' };
        }

        // 渲染书馆列表
        function renderLibraries() {
            const filteredLibraries = getFilteredLibraries();
            
            if (filteredLibraries.length === 0) {
                libraryList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📚</div>
                        <h3 class="empty-title">暂无书馆</h3>
                        <p class="empty-description">点击"新建书馆"按钮创建您的第一个书馆</p>
                    </div>
                `;
                return;
            }
            
            libraryList.innerHTML = filteredLibraries.map(library => {
                const statusInfo = getStatusLabel(library.status);
                return `
                <div class="library-card" data-id="${library.id}">
                    <div class="thumbnail">
                        ${library.cover}
                    </div>
                    <div class="library-info">
                        <div class="library-header">
                            <div class="library-name">${library.name}</div>
                            <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                        </div>
                        <div class="library-description">${library.description}</div>
                        <div class="library-meta">
                            <span>分类: ${library.category}</span>
                            <span>标签: ${library.tags.join(', ')}</span>
                            <span>创建时间: ${formatDate(library.createdAt)}</span>
                            <span>更新时间: ${formatDate(library.updatedAt)}</span>
                        </div>
                    </div>
                    <div class="library-actions">
                        <button class="action-btn" title="上传封面" onclick="uploadCover(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </button>
                        <button class="action-btn" title="添加书图" onclick="addImages(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button class="action-btn" title="预览" onclick="previewLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                            </svg>
                        </button>
                        <button class="action-btn" title="外观设置" onclick="editAppearance(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </button>
                        <button class="action-btn" title="定时发布" onclick="schedulePublish(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </button>
                        <button class="action-btn" title="分享" onclick="shareLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                                <polyline points="16 6 12 2 8 6"></polyline>
                                <line x1="12" y1="2" x2="12" y2="15"></line>
                            </svg>
                        </button>
                        <button class="action-btn" title="复制" onclick="duplicateLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        ${library.status === 'published' ? `
                        <button class="action-btn" title="下架" onclick="offlineLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="6" y1="9" x2="18" y2="9"></line>
                                <line x1="6" y1="15" x2="18" y2="15"></line>
                                <line x1="10" y1="12" x2="14" y2="12"></line>
                            </svg>
                        </button>
                        ` : library.status === 'offline' ? `
                        <button class="action-btn" title="上架" onclick="publishLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>
                        ` : `
                        <button class="action-btn" title="发布" onclick="publishLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>
                        `}
                        <button class="action-btn" title="编辑" onclick="editLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="action-btn delete" title="删除" onclick="deleteLibrary(${library.id})">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            `;
            }).join('');
        }



        // 删除书馆
        function deleteLibrary(id) {
            if (confirm('确定要删除这个书馆吗？')) {
                libraries = libraries.filter(library => library.id !== id);
                renderLibraries();
            }
        }

        // 创建新书馆
        function createNewLibrary() {
            const createMethod = prompt('请选择创建方式:\n1. 空白创建\n2. 从模板创建');
            
            if (createMethod === '1') {
                // 空白创建
                const libraryName = prompt('请输入书馆名称:');
                if (libraryName && libraryName.trim()) {
                    const libraryDescription = prompt('请输入书馆简介:');
                    const libraryCategory = prompt('请输入书馆分类:');
                    const libraryTags = prompt('请输入书馆标签（用逗号分隔）:');
                    
                    const newLibrary = {
                        id: Date.now(),
                        name: libraryName.trim(),
                        description: libraryDescription || '暂无简介',
                        cover: ['📚', '📷', '🎨', '✈️', '🎵', '📖', '🌟', '🌈'][Math.floor(Math.random() * 8)],
                        category: libraryCategory || '未分类',
                        tags: libraryTags ? libraryTags.split(',').map(tag => tag.trim()) : [],
                        status: 'draft',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        publishedAt: null,
                        access: 'public',
                        password: null,
                        version: 1,
                        versions: [
                            {
                                version: 1,
                                createdAt: new Date().toISOString(),
                                description: '初始版本'
                            }
                        ]
                    };
                    
                    libraries.unshift(newLibrary);
                    renderLibraries();
                    alert('书馆创建成功！');
                }
            } else if (createMethod === '2') {
                // 从模板创建
                const templates = [
                    { name: '艺术画册', description: '适合艺术作品展示', cover: '🎨', category: '艺术' },
                    { name: '摄影集', description: '适合摄影作品展示', cover: '📷', category: '摄影' },
                    { name: '旅行日记', description: '适合旅行照片和回忆', cover: '✈️', category: '生活' },
                    { name: '作品集', description: '适合个人或企业作品展示', cover: '📚', category: '其他' }
                ];
                
                let templateOptions = '请选择模板:\n';
                templates.forEach((template, index) => {
                    templateOptions += `${index + 1}. ${template.name} - ${template.description}\n`;
                });
                
                const templateIndex = prompt(templateOptions);
                const selectedTemplate = templates[parseInt(templateIndex) - 1];
                
                if (selectedTemplate) {
                    const libraryName = prompt('请输入书馆名称:', selectedTemplate.name);
                    if (libraryName && libraryName.trim()) {
                        const libraryDescription = prompt('请输入书馆简介:', selectedTemplate.description);
                        
                        const newLibrary = {
                            id: Date.now(),
                            name: libraryName.trim(),
                            description: libraryDescription || selectedTemplate.description,
                            cover: selectedTemplate.cover,
                            category: selectedTemplate.category,
                            tags: [],
                            status: 'draft',
                            createdAt: new Date().toISOString(),
                            updatedAt: new Date().toISOString(),
                            publishedAt: null,
                            access: 'public',
                            password: null,
                            version: 1,
                            versions: [
                                {
                                    version: 1,
                                    createdAt: new Date().toISOString(),
                                    description: '从模板创建'
                                }
                            ]
                        };
                        
                        libraries.unshift(newLibrary);
                        renderLibraries();
                        alert('书馆创建成功！');
                    }
                }
            }
        }

        // 编辑书馆
        function editLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const newName = prompt('请输入书馆名称:', library.name);
            if (newName && newName.trim()) {
                const newDescription = prompt('请输入书馆简介:', library.description);
                const newCategory = prompt('请输入书馆分类:', library.category);
                const newTags = prompt('请输入书馆标签（用逗号分隔）:', library.tags.join(','));
                
                library.name = newName.trim();
                library.description = newDescription || library.description;
                library.category = newCategory || library.category;
                library.tags = newTags ? newTags.split(',').map(tag => tag.trim()) : library.tags;
                library.updatedAt = new Date().toISOString();
                
                // 创建新版本
                library.version += 1;
                library.versions.push({
                    version: library.version,
                    createdAt: library.updatedAt,
                    description: '编辑更新'
                });
                
                renderLibraries();
                alert('书馆编辑成功！');
            }
        }

        // 发布书馆
        function publishLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const access = prompt('请选择访问权限:\n1. 公开\n2. 密码访问\n3. 指定用户');
            let password = null;
            
            if (access === '2') {
                password = prompt('请设置访问密码:');
            }
            
            library.status = 'published';
            library.publishedAt = new Date().toISOString();
            library.updatedAt = new Date().toISOString();
            library.access = access === '1' ? 'public' : access === '2' ? 'password' : 'private';
            library.password = password;
            
            // 创建新版本
            library.version += 1;
            library.versions.push({
                version: library.version,
                createdAt: library.updatedAt,
                description: '发布版本'
            });
            
            renderLibraries();
            alert('书馆发布成功！');
        }

        // 下架书馆
        function offlineLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            if (confirm('确定要下架这个书馆吗？下架后读者无法访问。')) {
                library.status = 'offline';
                library.updatedAt = new Date().toISOString();
                
                renderLibraries();
                alert('书馆下架成功！');
            }
        }

        // 添加书图
        function addImages(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            alert('书图添加功能开发中...\n\n支持功能：\n- 批量上传图片\n- 图片裁切\n- 比例预设\n- 拖拽排序');
            
            // 模拟添加图片
            library.updatedAt = new Date().toISOString();
            renderLibraries();
        }

        // 上传封面图
        function uploadCover(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            // 创建文件上传对话框
            const uploadHtml = `
                <div id="coverUploadDialog" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999;">
                    <div style="background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 90%; max-width: 500px; overflow: hidden;">
                        <div style="padding: 16px; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                            <h3>上传封面图</h3>
                            <button onclick="document.getElementById('coverUploadDialog').remove()" style="padding: 8px 16px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer;">关闭</button>
                        </div>
                        <div style="padding: 20px;">
                            <div style="margin-bottom: 20px;">
                                <h4>选择上传方式</h4>
                                <div style="display: flex; gap: 10px; margin-top: 10px;">
                                    <button id="uploadLocalBtn" style="padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">本地文件</button>
                                    <button id="usePresetBtn" style="padding: 10px 15px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">预设图标</button>
                                    <button id="useUrlBtn" style="padding: 10px 15px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">图片URL</button>
                                </div>
                            </div>
                            
                            <!-- 本地文件上传 -->
                            <div id="localUploadSection" style="margin-bottom: 20px;">
                                <input type="file" id="coverFileInput" accept="image/*" style="margin-bottom: 10px;">
                                <div style="margin-bottom: 10px;">
                                    <label>比例预设：</label>
                                    <select id="aspectRatio" style="margin-left: 10px;">
                                        <option value="1:1">1:1 正方形</option>
                                        <option value="4:3">4:3</option>
                                        <option value="16:9">16:9</option>
                                        <option value="自定义">自定义</option>
                                    </select>
                                </div>
                                <div id="imagePreview" style="width: 100%; height: 200px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; margin-top: 10px;">
                                    预览区域
                                </div>
                            </div>
                            
                            <!-- 预设图标选择 -->
                            <div id="presetSection" style="margin-bottom: 20px; display: none;">
                                <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">
                                    ${['📚', '📷', '🎨', '✈️', '🎵', '📖', '🌟', '🌈', '🌸', '🌊', '🏔️', '🌅', '🎭', '🎪', '🎯', '🎨'].map(icon => `
                                        <div class="preset-icon" data-icon="${icon}" style="width: 60px; height: 60px; border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.2s;">
                                            ${icon}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <!-- URL输入 -->
                            <div id="urlSection" style="margin-bottom: 20px; display: none;">
                                <input type="text" id="coverUrlInput" placeholder="请输入图片URL" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                            </div>
                            
                            <div style="text-align: center; margin-top: 20px;">
                                <button id="confirmUploadBtn" style="padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
                                    确认上传
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', uploadHtml);
            
            // 获取元素
            const dialog = document.getElementById('coverUploadDialog');
            const uploadLocalBtn = document.getElementById('uploadLocalBtn');
            const usePresetBtn = document.getElementById('usePresetBtn');
            const useUrlBtn = document.getElementById('useUrlBtn');
            const localUploadSection = document.getElementById('localUploadSection');
            const presetSection = document.getElementById('presetSection');
            const urlSection = document.getElementById('urlSection');
            const coverFileInput = document.getElementById('coverFileInput');
            const imagePreview = document.getElementById('imagePreview');
            const confirmUploadBtn = document.getElementById('confirmUploadBtn');
            const coverUrlInput = document.getElementById('coverUrlInput');
            
            // 切换上传方式
            uploadLocalBtn.onclick = function() {
                localUploadSection.style.display = 'block';
                presetSection.style.display = 'none';
                urlSection.style.display = 'none';
                uploadLocalBtn.style.background = '#007bff';
                usePresetBtn.style.background = '#6c757d';
                useUrlBtn.style.background = '#6c757d';
            };
            
            usePresetBtn.onclick = function() {
                localUploadSection.style.display = 'none';
                presetSection.style.display = 'block';
                urlSection.style.display = 'none';
                uploadLocalBtn.style.background = '#6c757d';
                usePresetBtn.style.background = '#007bff';
                useUrlBtn.style.background = '#6c757d';
            };
            
            useUrlBtn.onclick = function() {
                localUploadSection.style.display = 'none';
                presetSection.style.display = 'none';
                urlSection.style.display = 'block';
                uploadLocalBtn.style.background = '#6c757d';
                usePresetBtn.style.background = '#6c757d';
                useUrlBtn.style.background = '#007bff';
            };
            
            // 图片预览
            coverFileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        imagePreview.innerHTML = `<img src="${event.target.result}" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                    };
                    reader.readAsDataURL(file);
                }
            };
            
            // 预设图标选择
            document.querySelectorAll('.preset-icon').forEach(icon => {
                icon.onclick = function() {
                    document.querySelectorAll('.preset-icon').forEach(i => i.style.borderColor = '#ddd');
                    this.style.borderColor = '#007bff';
                    this.style.backgroundColor = 'rgba(0, 123, 255, 0.1)';
                };
            });
            
            // 确认上传
            confirmUploadBtn.onclick = function() {
                if (localUploadSection.style.display === 'block' && coverFileInput.files[0]) {
                    // 本地文件上传
                    const file = coverFileInput.files[0];
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        library.cover = `<img src="${event.target.result}" style="width: 100%; height: 100%; object-fit: cover;" />`;
                        library.updatedAt = new Date().toISOString();
                        renderLibraries();
                        dialog.remove();
                        alert('封面上传成功！');
                    };
                    reader.readAsDataURL(file);
                } else if (presetSection.style.display === 'block') {
                    // 预设图标选择
                    const selectedIcon = document.querySelector('.preset-icon[style*="border-color: rgb(0, 123, 255)"]');
                    if (selectedIcon) {
                        library.cover = selectedIcon.dataset.icon;
                        library.updatedAt = new Date().toISOString();
                        renderLibraries();
                        dialog.remove();
                        alert('封面更新成功！');
                    } else {
                        alert('请选择一个预设图标！');
                    }
                } else if (urlSection.style.display === 'block' && coverUrlInput.value.trim()) {
                    // URL输入
                    library.cover = `<img src="${coverUrlInput.value.trim()}" style="width: 100%; height: 100%; object-fit: cover;" />`;
                    library.updatedAt = new Date().toISOString();
                    renderLibraries();
                    dialog.remove();
                    alert('封面更新成功！');
                } else {
                    alert('请选择或输入封面图片！');
                }
            };
        }

        // 预览画册
        function previewLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const deviceType = prompt('请选择预览设备:\n1. PC\n2. 平板\n3. 手机');
            
            let deviceName = 'PC';
            let width = '100%';
            let height = '80vh';
            
            if (deviceType === '2') {
                deviceName = '平板';
                width = '768px';
                height = '1024px';
            } else if (deviceType === '3') {
                deviceName = '手机';
                width = '375px';
                height = '667px';
            }
            
            const previewHtml = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999;">
                    <div style="background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); overflow: hidden;">
                        <div style="padding: 16px; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                            <h3>${library.name} - ${deviceName}预览</h3>
                            <button onclick="this.parentElement.parentElement.parentElement.remove()" style="padding: 8px 16px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer;">关闭</button>
                        </div>
                        <div style="width: ${width}; height: ${height}; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <div style="width: 200px; height: 200px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 48px;">
                                ${library.cover}
                            </div>
                            <h2>${library.name}</h2>
                            <p style="color: #666; margin: 10px 0;">${library.description}</p>
                            <div style="color: #999; font-size: 14px; margin-top: 20px;">
                                分类: ${library.category}<br>
                                标签: ${library.tags.join(', ')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', previewHtml);
        }

        // 定时发布
        function schedulePublish(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const publishTime = prompt('请输入定时发布时间\n格式：YYYY-MM-DD HH:MM\n例如：2026-02-20 10:00');
            
            if (publishTime) {
                // 模拟定时发布
                const scheduledDate = new Date(publishTime.replace(' ', 'T'));
                const now = new Date();
                
                if (scheduledDate > now) {
                    const timeUntilPublish = scheduledDate - now;
                    
                    alert(`画册将在 ${publishTime} 自动发布！`);
                    
                    // 这里可以添加实际的定时任务逻辑
                    // 由于是前端模拟，这里仅做提示
                    setTimeout(() => {
                        if (confirm(`画册 "${library.name}" 已到发布时间，是否立即发布？`)) {
                            publishLibrary(id);
                        }
                    }, 5000); // 5秒后模拟发布提醒
                } else {
                    alert('发布时间不能早于当前时间！');
                }
            }
        }

        // 外观设置
        function editAppearance(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const transitionEffect = prompt('请选择页面转场效果:\n1. 翻页\n2. 滑动\n3. 淡入淡出');
            
            alert('外观设置已保存！\n\n设置内容：\n- 页面转场效果：' + (transitionEffect === '1' ? '翻页' : transitionEffect === '2' ? '滑动' : '淡入淡出'));
            
            library.updatedAt = new Date().toISOString();
            renderLibraries();
        }

        // 分享书馆
        function shareLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            if (library.status !== 'published') {
                alert('只有已发布的书馆才能分享！');
                return;
            }
            
            const shareLink = `https://example.com/library/${id}`;
            navigator.clipboard.writeText(shareLink).then(() => {
                alert('分享链接已复制到剪贴板！\n\n链接：' + shareLink);
            });
        }

        // 复制书馆
        function duplicateLibrary(id) {
            const library = libraries.find(l => l.id === id);
            if (!library) return;
            
            const newLibrary = JSON.parse(JSON.stringify(library));
            newLibrary.id = Date.now();
            newLibrary.name = library.name + ' (副本)';
            newLibrary.status = 'draft';
            newLibrary.createdAt = new Date().toISOString();
            newLibrary.updatedAt = new Date().toISOString();
            newLibrary.publishedAt = null;
            newLibrary.version = 1;
            newLibrary.versions = [
                {
                    version: 1,
                    createdAt: newLibrary.createdAt,
                    description: '复制版本'
                }
            ];
            
            libraries.unshift(newLibrary);
            renderLibraries();
            alert('书馆复制成功！');
        }

        // 初始化应用
        init();
    </script>
</body>
</html>
