<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子画册制作平台 - 自带流量的电子书制作工具</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f9ff;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.1);
            --success: #34c759;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 顶部导航栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-icon {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: var(--bg-secondary);
        }

        .btn-accent {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-accent:hover {
            background-color: var(--accent-hover);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            cursor: pointer;
        }

        /* 主内容区域 */
        .main-content {
            display: flex;
            gap: 60px;
            align-items: center;
            padding: 80px 0;
        }

        .content-left {
            flex: 1;
            max-width: 500px;
        }

        .content-right {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* 特色标签 */
        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background-color: rgba(52, 199, 89, 0.1);
            color: var(--success);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .feature-badge svg {
            width: 14px;
            height: 14px;
        }

        /* 标题样式 */
        .main-title {
            font-size: 40px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .sub-title {
            font-size: 20px;
            background: linear-gradient(90deg, var(--success), #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            font-weight: 500;
        }

        /* 功能列表 */
        .feature-list {
            margin-bottom: 40px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .feature-item svg {
            width: 16px;
            height: 16px;
            color: var(--success);
            margin-top: 4px;
            flex-shrink: 0;
        }

        .feature-item p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 行动按钮 */
        .action-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 12px 24px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            padding: 12px 24px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background-color: var(--bg-secondary);
        }

        /* 书架样式 */
        .bookshelf-container {
            position: relative;
            max-width: 400px;
        }

        .case-link {
            position: absolute;
            top: -30px;
            right: 0;
            color: var(--accent);
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }

        .case-link:hover {
            text-decoration: underline;
        }

        .bookshelf {
            position: relative;
            margin-bottom: 40px;
        }

        .shelf {
            width: 100%;
            height: 12px;
            background-color: #d4a76a;
            border-radius: 2px;
            position: relative;
            margin-bottom: 40px;
        }

        .shelf::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            height: 4px;
            background-color: #b88b50;
            border-radius: 0 0 2px 2px;
        }

        .shelf-brackets {
            position: absolute;
            top: 12px;
            left: 20px;
            right: 20px;
            height: 30px;
            display: flex;
            justify-content: space-between;
        }

        .bracket {
            width: 8px;
            height: 100%;
            background-color: #d4a76a;
            border-radius: 0 0 4px 4px;
        }

        .books {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            justify-content: center;
        }

        .book {
            width: 100px;
            height: 140px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: white;
            box-shadow: 0 4px 8px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .book::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .book-1 {
            background-color: #3498db;
        }

        .book-2 {
            background-color: #2c3e50;
        }

        .book-3 {
            background-color: #e74c3c;
        }

        .book-4 {
            background-color: #27ae60;
        }

        .book-5 {
            background-color: #f39c12;
        }

        .book-6 {
            background-color: #9b59b6;
        }

        .book-categories {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .category-tag {
            padding: 4px 8px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
                text-align: center;
                padding: 60px 0;
            }

            .content-left {
                max-width: 100%;
                order: 2;
            }

            .content-right {
                order: 1;
            }

            .action-buttons {
                justify-content: center;
            }

            .feature-item {
                justify-content: center;
            }

            .feature-item p {
                text-align: left;
            }
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 32px;
            }

            .sub-title {
                font-size: 18px;
            }

            .header {
                padding: 12px 0;
            }

            .header-right {
                gap: 8px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 13px;
            }

            .books {
                gap: 12px;
            }

            .book {
                width: 80px;
                height: 110px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <div class="logo">📚 电子画册</div>
            </div>
            <div class="header-right">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <a href="#" class="btn">创建电子书</a>
                <a href="library.html" class="btn btn-accent">进入工作台</a>
                <div class="user-avatar">U</div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <div class="main-content">

            <div class="content-left">
                <div class="feature-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>

                    方便，快捷，易用
                </div>

                        </svg>

                    </div>
                    <div class="feature-item">

                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <p>海量模板，零基础快速制作，即改即用</p>
                    </div>
                    <div class="feature-item">

                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <p>交互式画册，支持添加视频/音乐/链接/动画</p>
                    </div>
                    <div class="feature-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <p>多端适配，手机/平板/电脑均可阅读</p>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn-primary">
                        马上免费制作
                    </button>
                    <button class="btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        看介绍视频
                    </button>
                </div>
            </div>

            <!-- 右侧书架 -->
            <div class="content-right">
                <div class="bookshelf-container">
                    <a href="#" class="case-link">打开翻页案例</a>
                    
                    <!-- 上层书架 -->
                    <div class="bookshelf">
                        <div class="books">
                            <div class="book book-1">企业宣传</div>
                            <div class="book book-2">产品画册</div>

                        <div class="shelf"></div>
                        <div class="shelf-brackets">
                            <div class="bracket"></div>
                            <div class="bracket"></div>
                        </div>
                        <div class="book-categories">
                            <span class="category-tag">企业宣传</span>
                            <span class="category-tag">产品画册</span>
                            <span class="category-tag">教辅教材</span>

                    </div>
                    
                    <!-- 下层书架 -->
                    <div class="bookshelf">
                        <div class="books">

                        </div>
                        <div class="shelf"></div>
                        <div class="shelf-brackets">
                            <div class="bracket"></div>
                            <div class="bracket"></div>
                        </div>
                        <div class="book-categories">
                            <span class="category-tag">企业内刊</span>
                            <span class="category-tag">招生手册</span>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
